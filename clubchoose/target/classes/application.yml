file:
  upload-dir: E:/uploads/avatars   # 实际文件存储目录
# --- 数据源配置 ---
spring:
  web:
    resources:
      static-location:classpath:/static/
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/club_db?useSSL=false&serverTimezone=GMT%2B8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 9527
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# --- MyBatis Plus 配置 ---
mybatis-plus:
  # 开启 SQL 日志打印，方便你看后面接口调用时的 SQL 语句
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 扫描 Mapper XML 文件的路径
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类别名包
  type-aliases-package: com.example.club.entity
server:
  port:8080